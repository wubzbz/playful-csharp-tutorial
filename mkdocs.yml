site_name: 我的文档
site_url: https://your-name.github.io/your-repo

theme:
  name: material
  features:
    - navigation.instant               # 瞬时加载
    - navigation.tracking              # 自动定位当前位置
    - navigation.sections              # 章节直接展开（最重要！不用多点！）
    - navigation.expand                # 全部默认展开
    - navigation.indexes                # 章节首页
    - navigation.top                   # 返回顶部
    - navigation.footer                # 上一页 / 下一页
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.code.select

  # 太阳 ☀️ / 月亮 🌙 图标（你要的）
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

  font:
    text: Noto Sans SC
    code: JetBrains Mono

# 插件：自动章节导航
plugins:
  - awesome-pages:
      collapse_single_pages: false
  - search

# 🔥 关键：支持 GFM 语法（删除线、卡片、表情、表格等）
markdown_extensions:
  - admonition                 # 卡片 !!! ???
  - pymdownx.blocks.tab        # 切换 ///
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys              # 按键++
  - pymdownx.mark              # 高亮==
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  # - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
